name: Azure Smoke Test

# ---------------------------------------------------------------------------
# End-to-end smoke test for the latest published VHD:
#   1. pick one of the perpetual run RGs from the pool
#   2. deploy the latest released VHD as a VM in that RG
#   3. SSH to the VM and assert the NixOS version string
#   4. tear the RG down to *empty* (not deleted — see docs/ci-azure.md)
#
# Teardown is done with a complete-mode deployment of an empty template so
# that ARM computes the delete DAG itself (disks before NICs before VNets,
# etc.).  Up to 3 attempts with 60s backoff handle transient ARM errors
# (~20% observed failure rate on the first try).  After retries, the RG is
# verified empty; if not, the job fails loudly and the janitor workflow
# will re-attempt cleanup on its next scheduled run.
# ---------------------------------------------------------------------------

on:
  schedule:
    # Saturday 18:00 UTC (≈ Sat night US Central)
    - cron: "0 18 * * 6"
  workflow_dispatch:

permissions:
  id-token: write      # OIDC federation to Azure
  contents: read

concurrency:
  group: azure-smoke-test
  cancel-in-progress: false

jobs:
  smoke:
    name: Deploy latest VHD and smoke-test
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Preflight — verify ref is allowed
        # OIDC federation is only configured for `main` (production smoke)
        # and `copilot/smoke-dev` (long-lived agent iteration branch).
        # Refuse other refs early with a clear message instead of failing
        # opaquely at `azure/login`. Both branches share the same RG pool
        # and RBAC, so blast radius is identical.
        env:
          REF: ${{ github.ref }}
        run: |
          set -eu
          case "$REF" in
            refs/heads/main|refs/heads/copilot/smoke-dev) ;;
            *)
              echo "::error::Azure smoke test only runs from refs/heads/main or refs/heads/copilot/smoke-dev (got: $REF). OIDC federation is not configured for other refs; see scripts/bootstrap-azure-ci.sh."
              exit 1
              ;;
          esac

      - name: Preflight — verify Azure CI is bootstrapped
        id: preflight
        env:
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RUN_RGS:         ${{ vars.AZURE_RUN_RGS }}
          AZURE_CONTROL_RG:      ${{ vars.AZURE_CONTROL_RG }}
        run: |
          set -u
          missing=()
          [ -n "${AZURE_CLIENT_ID:-}" ]       || missing+=("secret AZURE_CLIENT_ID")
          [ -n "${AZURE_TENANT_ID:-}" ]       || missing+=("secret AZURE_TENANT_ID")
          [ -n "${AZURE_SUBSCRIPTION_ID:-}" ] || missing+=("secret AZURE_SUBSCRIPTION_ID")
          [ -n "${AZURE_RUN_RGS:-}" ]         || missing+=("var AZURE_RUN_RGS")
          [ -n "${AZURE_CONTROL_RG:-}" ]      || missing+=("var AZURE_CONTROL_RG")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice::Azure CI is not bootstrapped — skipping. Missing: ${missing[*]}. Run scripts/bootstrap-azure-ci.sh to configure."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.preflight.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: Preflight — Azure CLI flag sanity
        if: steps.preflight.outputs.ok == 'true'
        # Fail fast if the Azure CLI on the runner is missing flags this
        # workflow depends on. The smoke test has burned multiple PRs
        # discovering that flags like `--supported-disk-controller-types`
        # don't exist on `az disk create` / `az disk update` / `az image
        # create`; this guard makes such drift loud and immediate.
        run: |
          set -euo pipefail
          az --version | head -n1
          require_flag() {
            local flag="$1"
            shift
            local cmd=("$@")
            # NB: do NOT use `grep -Fq` here. With `set -o pipefail`, grep -q
            # exits on first match and SIGPIPEs the upstream `az ... --help`,
            # which then exits non-zero. pipefail propagates that, making
            # this check fail even when the flag IS present (run 25020013831).
            # Consume the full stream and discard output instead.
            if ! "${cmd[@]}" --help 2>&1 | grep -F -- "$flag" >/dev/null; then
              echo "::error::Azure CLI '${cmd[*]}' is missing the '$flag' flag (CLI: $(az --version | head -n1)). This workflow depends on it; refuse to proceed."
              exit 1
            fi
            echo "ok: '${cmd[*]} $flag'"
          }
          # Flags we depend on:
          require_flag "--upload-type"          az disk create
          require_flag "--upload-size-bytes"    az disk create
          require_flag "--hyper-v-generation"   az disk create
          require_flag "--access-level"         az disk grant-access
          require_flag "--hyper-v-generation"   az image create
          require_flag "--disk-controller-type" az vm create

      - name: Azure login (OIDC)
        if: steps.preflight.outputs.ok == 'true'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Pick a run RG from the pool based on the ISO week number so the
      # same RG isn't hammered every week and we exercise both slots.
      - name: Select run RG from pool
        if: steps.preflight.outputs.ok == 'true'
        id: pick
        env:
          AZURE_RUN_RGS: ${{ vars.AZURE_RUN_RGS }}
        run: |
          set -eu
          read -r -a pool <<< "$AZURE_RUN_RGS"
          week=$(date -u +%V)
          # `10#` forces base-10 parsing; ISO week numbers like "08"/"09"
          # would otherwise be treated as invalid octal by bash arithmetic.
          idx=$(( 10#$week % ${#pool[@]} ))
          rg="${pool[$idx]}"
          echo "Selected run RG: $rg (pool size ${#pool[@]}, week $week)"
          echo "rg=$rg" >> "$GITHUB_OUTPUT"

      # --- actual deploy + smoke test --------------------------------------
      # Pull the latest released VHD, push it through Azure as a Managed
      # Image, boot a small B2s VM from it locked down to the runner's IP,
      # SSH in, and assert NixOS booted. Cost per run: well under $0.10.
      - name: Resolve latest release
        if: steps.preflight.outputs.ok == 'true'
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Wrap gh API calls in a retry/backoff loop. The GitHub API
          # occasionally returns transient 401/5xx responses to the
          # GITHUB_TOKEN that gh uses (observed in run #18: a 401 on
          # the very first `gh release list` while the same token had
          # full `contents: read` and worked in the immediately prior
          # run). Three attempts with 5/15s backoff are enough to ride
          # out these blips without masking real auth failures.
          gh_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                local delay=$(( attempt * 10 - 5 ))
                echo "gh call failed (attempt ${attempt}/3): $* — retrying in ${delay}s" >&2
                sleep "$delay"
              fi
            done
            echo "::error::gh call failed after 3 attempts: $*" >&2
            return 1
          }
          tag=$(gh_retry gh release list --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$tag" ]; then
            echo "::error::No GitHub Releases found — has Weekly Forge run yet?"
            exit 1
          fi
          # Resolve the gzipped VHD asset by pattern rather than by an
          # exact filename. The asset has been renamed historically (e.g.
          # nixos-azure-* -> nixos-azimage-*), and old releases keep their
          # original name; matching *.vhd.gz keeps the smoke test working
          # across such renames as long as exactly one such asset exists.
          # Fetch name+url together in a single API call so we don't pay
          # double for the rate-limit / transient-failure window.
          assets_json=$(gh_retry gh release view "$tag" --json assets \
            -q '[.assets[] | select(.name | test("\\.vhd\\.gz$")) | {name, url}]')
          count=$(echo "$assets_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "::error::Release $tag has no *.vhd.gz asset"
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            names=$(echo "$assets_json" | jq -r '[.[].name] | join(" ")')
            echo "::error::Release $tag has multiple *.vhd.gz assets: ${names}"
            exit 1
          fi
          asset=$(echo "$assets_json" | jq -r '.[0].name')
          url=$(echo "$assets_json" | jq -r '.[0].url')
          vhd="${asset%.gz}"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "url=$url"     >> "$GITHUB_OUTPUT"
          echo "vhd=$vhd"     >> "$GITHUB_OUTPUT"

      - name: Stage VHD as managed disk in run RG
        if: steps.preflight.outputs.ok == 'true'
        id: stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RG:       ${{ steps.pick.outputs.rg }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
          TAG:      ${{ steps.rel.outputs.tag }}
          ASSET:    ${{ steps.rel.outputs.asset }}
          VHD:      ${{ steps.rel.outputs.vhd }}
        run: |
          set -euo pipefail
          # Direct-upload managed disk: ARM hands out a short-lived
          # write SAS backed by Azure's compute fabric (not a customer
          # storage account), the runner streams the VHD into it, then
          # ARM seals the disk. No storage account is on the data path,
          # so org policies that forbid publicNetworkAccess=Enabled on
          # storage accounts are satisfied without any networking
          # exception, private endpoint, or self-hosted runner.
          DISK_NAME="smoke-src-${TAG}"
          # Idempotent: reuse an existing sealed disk for the same
          # release tag if a previous attempt already finished. If a
          # prior attempt is wedged in ReadyToUpload (e.g. the runner
          # died mid-upload), drop and recreate so we get a fresh SAS.
          state=$(az disk show -g "$RG" -n "$DISK_NAME" \
            --query diskState -o tsv 2>/dev/null || true)
          if [ "$state" = "Unattached" ] || [ "$state" = "Attached" ]; then
            echo "disk $DISK_NAME already sealed (state=$state) — reusing"
            disk_id=$(az disk show -g "$RG" -n "$DISK_NAME" --query id -o tsv)
          else
            if [ -n "$state" ]; then
              echo "disk $DISK_NAME exists in state '$state' — recreating"
              az disk delete -g "$RG" -n "$DISK_NAME" --yes >/dev/null
            fi
            echo "downloading $ASSET from latest release"
            gh release download "$TAG" --pattern "$ASSET" --output "$ASSET"
            echo "decompressing"
            gunzip "$ASSET"
            ls -lh "$VHD"
            # The uncompressed VHD is the fixed-VHD blob (data + 512B
            # footer). az disk create --upload-size-bytes wants exactly
            # that size; `stat -c %s` gives it without hard-coding the
            # 8 GiB+512 B figure pinned by virtualisation.diskSize in
            # core_pulse.nix.
            size=$(stat -c %s "$VHD")
            echo "creating managed disk $DISK_NAME (upload, $size bytes)"
            # NOTE: there is no CLI knob to declare
            # supportedCapabilities.diskControllerTypes on a managed disk
            # or managed image — `az disk create`, `az disk update`, and
            # `az image create` all reject `--supported-disk-controller-types`
            # (verified on azure-cli 2.85.0; see the CLI sanity preflight
            # step earlier in this workflow). The disk controller is
            # selected per-VM via `az vm create --disk-controller-type`
            # below; the smoke test therefore stays pinned to a v6 SKU +
            # SCSI, which is what the published image is validated for.
            disk_id=$(az disk create -g "$RG" -n "$DISK_NAME" \
              --location "$LOCATION" \
              --upload-type Upload \
              --upload-size-bytes "$size" \
              --hyper-v-generation V2 \
              --os-type Linux \
              --query id -o tsv)
            echo "requesting write SAS"
            sas=$(az disk grant-access -g "$RG" -n "$DISK_NAME" \
              --access-level Write \
              --duration-in-seconds 3600 \
              --query accessSAS -o tsv)
            # azcopy is preinstalled on ubuntu-latest GitHub-hosted runners.
            echo "uploading VHD via AzCopy"
            # azcopy wants to create ~/.azcopy/{plans,logs}; on hosted
            # runners /home/runner/.azcopy can end up owned by root from
            # earlier steps (e.g. azure/login), so point both locations
            # at writable temp dirs to avoid "permission denied" on
            # mkdir /home/runner/.azcopy/plans.
            azcopy_log_location=$(mktemp -d)
            azcopy_job_plan_location=$(mktemp -d)
            cleanup_azcopy_temp_dirs() {
              rm -rf "$azcopy_log_location" "$azcopy_job_plan_location"
            }
            trap cleanup_azcopy_temp_dirs EXIT
            AZCOPY_LOG_LOCATION="$azcopy_log_location" \
            AZCOPY_JOB_PLAN_LOCATION="$azcopy_job_plan_location" \
              azcopy copy "$VHD" "$sas" --blob-type PageBlob
            trap - EXIT
            cleanup_azcopy_temp_dirs
            echo "revoking write SAS"
            az disk revoke-access -g "$RG" -n "$DISK_NAME" >/dev/null
            rm -f "$VHD"
          fi
          echo "disk_id=$disk_id" >> "$GITHUB_OUTPUT"

      - name: Create Managed Image from staged disk
        if: steps.preflight.outputs.ok == 'true'
        id: image
        env:
          RG:      ${{ steps.pick.outputs.rg }}
          TAG:     ${{ steps.rel.outputs.tag }}
          DISK_ID: ${{ steps.stage.outputs.disk_id }}
        run: |
          set -euo pipefail
          IMG="smoke-img-${TAG}"
          # Idempotent: if the image already exists in this RG, reuse it.
          if ! az image show -g "$RG" -n "$IMG" >/dev/null 2>&1; then
            # Note: `az image create` does not expose
            # supportedDiskControllerTypes; the disk controller is selected
            # on the VM via `az vm create --disk-controller-type` (pinned to
            # SCSI below to match this SCSI-validated NixOS image).
            az image create -g "$RG" -n "$IMG" \
              --os-type Linux \
              --hyper-v-generation V2 \
              --source "$DISK_ID" >/dev/null
          fi
          echo "image=$IMG" >> "$GITHUB_OUTPUT"

      - name: Generate ephemeral SSH keypair
        if: steps.preflight.outputs.ok == 'true'
        id: ssh
        run: |
          set -euo pipefail
          d=$(mktemp -d)
          chmod 700 "$d"
          ssh-keygen -t ed25519 -N '' -C 'nixos-ci-smoke' -f "$d/id" >/dev/null
          chmod 600 "$d/id"
          echo "dir=$d" >> "$GITHUB_OUTPUT"

      - name: Determine runner public IP
        if: steps.preflight.outputs.ok == 'true'
        id: ip
        run: |
          set -euo pipefail
          ip=$(curl -fsS --retry 3 https://api.ipify.org)
          # Sanity check: must look like an IPv4.
          if ! echo "$ip" | grep -Eq '^[0-9.]+$'; then
            echo "::error::Unexpected runner IP: $ip"
            exit 1
          fi
          echo "runner_ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Create locked-down NSG
        if: steps.preflight.outputs.ok == 'true'
        env:
          RG:        ${{ steps.pick.outputs.rg }}
          RUNNER_IP: ${{ steps.ip.outputs.runner_ip }}
        run: |
          set -euo pipefail
          az network nsg create -g "$RG" -n smoke-nsg -l "${{ vars.AZURE_LOCATION }}" >/dev/null
          az network nsg rule create -g "$RG" --nsg-name smoke-nsg \
            --name allow-ssh-from-runner --priority 1000 \
            --source-address-prefixes "${RUNNER_IP}/32" \
            --destination-port-ranges 22 \
            --access Allow --protocol Tcp --direction Inbound >/dev/null

      - name: Create smoke-test VM
        if: steps.preflight.outputs.ok == 'true'
        id: vm
        env:
          RG:    ${{ steps.pick.outputs.rg }}
          IMG:   ${{ steps.image.outputs.image }}
          SSH_DIR: ${{ steps.ssh.outputs.dir }}
        run: |
          set -euo pipefail
          # SCSI+NVMe drivers are in the initrd via core_pulse.nix, but
          # Azure also requires the *disk* to declare
          # supportedCapabilities.diskControllerTypes for v7 (NVMe-only)
          # boots — and the CLI exposes no flag to set that on a managed
          # disk or image. We therefore stay on a v6 SKU + SCSI, which is
          # the path validated end-to-end. v7 NVMe-only SKUs are not
          # supported by the published image today.
          az vm create -g "$RG" -n smoke-vm \
            --image "$IMG" \
            --size Standard_E8-2as_v6 \
            --disk-controller-type SCSI \
            --admin-username azureuser \
            --ssh-key-values "$SSH_DIR/id.pub" \
            --public-ip-sku Standard \
            --nsg smoke-nsg \
            --output none
          ip=$(az vm show -d -g "$RG" -n smoke-vm --query publicIps -o tsv)
          if [ -z "$ip" ]; then
            echo "::error::VM has no public IP"
            exit 1
          fi
          echo "public_ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH on VM
        if: steps.preflight.outputs.ok == 'true'
        env:
          IP: ${{ steps.vm.outputs.public_ip }}
        run: |
          set -u
          for i in $(seq 1 30); do
            if nc -z -w 5 "$IP" 22; then
              echo "SSH reachable after $i attempt(s)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSH never came up on $IP after 5 minutes"
          exit 1

      - name: SSH and assert NixOS
        if: steps.preflight.outputs.ok == 'true'
        id: assert
        env:
          IP:      ${{ steps.vm.outputs.public_ip }}
          SSH_DIR: ${{ steps.ssh.outputs.dir }}
        run: |
          set -euo pipefail
          out=$(ssh \
            -i "$SSH_DIR/id" \
            -o StrictHostKeyChecking=accept-new \
            -o BatchMode=yes \
            -o ConnectTimeout=15 \
            -o IdentitiesOnly=yes \
            "azureuser@${IP}" \
            'cat /etc/os-release; echo ---; nixos-version')
          echo "$out"
          echo "$out" | grep -Eq '^ID=nixos$' \
            || { echo "::error::/etc/os-release does not declare ID=nixos"; exit 1; }
          nv=$(echo "$out" | awk '/^---$/{flag=1;next} flag' | head -n1)
          if [ -z "$nv" ]; then
            echo "::error::nixos-version returned empty output"
            exit 1
          fi
          echo "nixos_version=$nv" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always() && steps.preflight.outputs.ok == 'true'
        env:
          TAG:     ${{ steps.rel.outputs.tag }}
          IMG:     ${{ steps.image.outputs.image }}
          IP:      ${{ steps.vm.outputs.public_ip }}
          NV:      ${{ steps.assert.outputs.nixos_version }}
          RG:      ${{ steps.pick.outputs.rg }}
        run: |
          {
            echo "### Smoke test summary"
            echo
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Release tag | \`${TAG:-?}\` |"
            echo "| Managed image | \`${IMG:-?}\` |"
            echo "| Run RG | \`${RG:-?}\` |"
            # Redact last octet of public IP.
            ipred=$(echo "${IP:-}" | sed -E 's/\.[0-9]+$/.x/')
            echo "| VM public IP | \`${ipred:-?}\` |"
            echo "| nixos-version | \`${NV:-?}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

      # -----------------------------------------------------------------
      # Layer 1 — complete-mode teardown with retry + backoff.
      # The empty template tells ARM "the desired state of this RG is
      # nothing"; ARM deletes every resource in dependency order.
      # Role assignments on the RG itself are untouched because the
      # RG is not deleted.
      # -----------------------------------------------------------------
      - name: Teardown run RG (complete-mode, with retry)
        if: always() && steps.preflight.outputs.ok == 'true'
        env:
          RG: ${{ steps.pick.outputs.rg }}
        run: |
          set -u
          ok=0
          for attempt in 1 2 3; do
            echo "::group::Teardown attempt ${attempt}"
            if az deployment group create \
                 --resource-group "$RG" \
                 --name "teardown-$(date -u +%Y%m%d-%H%M%S)" \
                 --mode Complete \
                 --template-file scripts/azure/empty-rg.json; then
              echo "Attempt ${attempt} succeeded"
              ok=1
              echo "::endgroup::"
              break
            fi
            echo "Attempt ${attempt} failed"
            echo "::endgroup::"
            sleep 60
          done
          if [ "$ok" -ne 1 ]; then
            echo "::warning::All 3 teardown attempts failed for $RG"
          fi

      # -----------------------------------------------------------------
      # Layer 2 — verify RG is actually empty. Fails the job loudly if
      # not, which surfaces as a red workflow → GitHub notifies you.
      # -----------------------------------------------------------------
      - name: Verify run RG is empty
        if: always() && steps.preflight.outputs.ok == 'true'
        env:
          RG: ${{ steps.pick.outputs.rg }}
        run: |
          set -eu
          remaining=$(az resource list -g "$RG" --query "length(@)" -o tsv)
          echo "Resources remaining in $RG: $remaining"
          if [ "$remaining" -ne 0 ]; then
            az resource list -g "$RG" -o table || true
            echo "::error::Run RG $RG is not empty after teardown (remaining=$remaining). Janitor will retry."
            exit 1
          fi
