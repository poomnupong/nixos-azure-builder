name: Azure Smoke Test

# ---------------------------------------------------------------------------
# End-to-end smoke test for the latest published VHD:
#   1. prepare shared resources (disk, gallery, image) in a single run RG
#   2. deploy VMs in parallel (SCSI + NVMe matrix) from the same image
#   3. SSH to each VM and assert the NixOS version string
#   4. tear the RG down to *empty* (not deleted — see docs/ci-azure.md)
#
# The workflow uses three jobs:
#   prepare  — stages the VHD and creates a gallery image (runs once)
#   smoke    — matrix [SCSI, NVMe]; boots a VM per controller type
#   cleanup  — complete-mode teardown after both smoke legs finish
#
# Both matrix legs share a single run RG. Resource names include the
# controller type where needed (VM, NSG) to avoid collisions.
# Standard_D4ads_v5 supports both SCSI and NVMe disk controllers.
#
# Teardown is done with a complete-mode deployment of an empty template so
# that ARM computes the delete DAG itself (disks before NICs before VNets,
# etc.).  Up to 3 attempts with 60s backoff handle transient ARM errors
# (~20% observed failure rate on the first try).  After retries, the RG is
# verified empty; if not, the job fails loudly and the janitor workflow
# will re-attempt cleanup on its next scheduled run.
# ---------------------------------------------------------------------------

on:
  schedule:
    # Saturday 18:00 UTC (~ Sat night US Central)
    - cron: "0 18 * * 6"
  workflow_run:
    workflows: ["Weekly Forge"]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write      # OIDC federation to Azure
  contents: read

concurrency:
  group: azure-smoke-test
  cancel-in-progress: false

jobs:
  # =====================================================================
  # Job 1: prepare --- create shared resources (disk, gallery, image)
  # =====================================================================
  prepare:
    name: Prepare image
    # When triggered by workflow_run (Weekly Forge), only run if the forge succeeded.
    # Schedule and workflow_dispatch triggers always run (workflow_run.conclusion is empty).
    if: >-
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      ok:      ${{ steps.preflight.outputs.ok }}
      rg:      ${{ steps.pick.outputs.rg }}
      tag:     ${{ steps.rel.outputs.tag }}
      gallery: ${{ steps.image.outputs.gallery }}
      img_def: ${{ steps.image.outputs.img_def }}
      img_ver: ${{ steps.image.outputs.img_ver }}

    steps:
      - name: "Preflight \u2014 verify ref is allowed"
        # OIDC federation is only configured for `main` (production smoke)
        # and `copilot/smoke-dev` (long-lived agent iteration branch).
        # Refuse other refs early with a clear message instead of failing
        # opaquely at `azure/login`. Both branches share the same RG pool
        # and RBAC, so blast radius is identical.
        env:
          REF: ${{ github.ref }}
        run: |
          set -eu
          case "$REF" in
            refs/heads/main|refs/heads/copilot/smoke-dev) ;;
            *)
              echo "::error::Azure smoke test only runs from refs/heads/main or refs/heads/copilot/smoke-dev (got: $REF). OIDC federation is not configured for other refs; see scripts/bootstrap-azure-ci.sh."
              exit 1
              ;;
          esac

      - name: "Preflight \u2014 verify Azure CI is bootstrapped"
        id: preflight
        env:
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_RUN_RGS:         ${{ vars.AZURE_RUN_RGS }}
          AZURE_CONTROL_RG:      ${{ vars.AZURE_CONTROL_RG }}
        run: |
          set -u
          missing=()
          [ -n "${AZURE_CLIENT_ID:-}" ]       || missing+=("secret AZURE_CLIENT_ID")
          [ -n "${AZURE_TENANT_ID:-}" ]       || missing+=("secret AZURE_TENANT_ID")
          [ -n "${AZURE_SUBSCRIPTION_ID:-}" ] || missing+=("secret AZURE_SUBSCRIPTION_ID")
          [ -n "${AZURE_RUN_RGS:-}" ]         || missing+=("var AZURE_RUN_RGS")
          [ -n "${AZURE_CONTROL_RG:-}" ]      || missing+=("var AZURE_CONTROL_RG")
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice::Azure CI is not bootstrapped \u2014 skipping. Missing: ${missing[*]}. Run scripts/bootstrap-azure-ci.sh to configure."
            echo "ok=false" >> "$GITHUB_OUTPUT"
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout repository
        if: steps.preflight.outputs.ok == 'true'
        uses: actions/checkout@v4

      - name: "Preflight \u2014 Azure CLI flag sanity"
        if: steps.preflight.outputs.ok == 'true'
        # Fail fast if the Azure CLI on the runner is missing flags this
        # workflow depends on. The smoke test has burned multiple PRs
        # discovering that flags like `--supported-disk-controller-types`
        # don't exist on `az disk create` / `az disk update` / `az image
        # create`; this guard makes such drift loud and immediate.
        run: |
          set -euo pipefail
          az --version | head -n1
          require_flag() {
            local flag="$1"
            shift
            local cmd=("$@")
            # Use `grep -F ... >/dev/null` rather than `grep -Fq`: under
            # `set -o pipefail`, `-q` closes the pipe on first match and
            # SIGPIPEs the upstream `az ... --help`, turning success into
            # a spurious failure (see run 25025315153 / 25020013831).
            if ! "${cmd[@]}" --help 2>&1 | grep -F -- "$flag" >/dev/null; then
              echo "::error::Azure CLI '${cmd[*]}' is missing the '$flag' flag (CLI: $(az --version | head -n1)). This workflow depends on it; refuse to proceed."
              exit 1
            fi
            echo "ok: '${cmd[*]} $flag'"
          }
          # Flags we depend on:
          require_flag "--upload-type"          az disk create
          require_flag "--upload-size-bytes"    az disk create
          require_flag "--hyper-v-generation"   az disk create
          require_flag "--access-level"         az disk grant-access
          require_flag "--features"              az sig image-definition create
          require_flag "--os-snapshot"           az sig image-version create
          require_flag "--disk-controller-type" az vm create

      - name: Azure login (OIDC)
        if: steps.preflight.outputs.ok == 'true'
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # Pick a run RG from the pool. Both matrix legs share a single RG;
      # teardown runs once after both legs finish (in the cleanup job).
      - name: Select run RG from pool
        if: steps.preflight.outputs.ok == 'true'
        id: pick
        env:
          AZURE_RUN_RGS: ${{ vars.AZURE_RUN_RGS }}
        run: |
          set -eu
          read -r -a pool <<< "$AZURE_RUN_RGS"
          # Rotate through the pool by ISO week number so that a slow
          # teardown on one run doesn't block the next scheduled run.
          week=$(date -u +%V)
          idx=$(( 10#$week % ${#pool[@]} ))
          rg="${pool[$idx]}"
          echo "Selected run RG: $rg (pool size ${#pool[@]}, week $week)"
          echo "rg=$rg" >> "$GITHUB_OUTPUT"

      # --- shared resource creation ----------------------------------------
      # Pull the latest released VHD, push it through Azure as a Managed
      # Disk + Compute Gallery image. Both SCSI and NVMe legs consume the
      # same image.
      - name: Resolve latest release
        if: steps.preflight.outputs.ok == 'true'
        id: rel
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          # Wrap gh API calls in a retry/backoff loop. The GitHub API
          # occasionally returns transient 401/5xx responses to the
          # GITHUB_TOKEN that gh uses (observed in run #18: a 401 on
          # the very first `gh release list` while the same token had
          # full `contents: read` and worked in the immediately prior
          # run). Three attempts with 5/15s backoff are enough to ride
          # out these blips without masking real auth failures.
          gh_retry() {
            local attempt
            for attempt in 1 2 3; do
              if "$@"; then
                return 0
              fi
              if [ "$attempt" -lt 3 ]; then
                local delay=$(( attempt * 10 - 5 ))
                echo "gh call failed (attempt ${attempt}/3): $* \u2014 retrying in ${delay}s" >&2
                sleep "$delay"
              fi
            done
            echo "::error::gh call failed after 3 attempts: $*" >&2
            return 1
          }
          tag=$(gh_retry gh release list --limit 1 --json tagName -q '.[0].tagName // empty')
          if [ -z "$tag" ]; then
            echo "::error::No GitHub Releases found \u2014 has Weekly Forge run yet?"
            exit 1
          fi
          # Resolve the gzipped VHD asset by pattern rather than by an
          # exact filename. The asset has been renamed historically (e.g.
          # nixos-azure-* -> nixos-azimage-*), and old releases keep their
          # original name; matching *.vhd.gz keeps the smoke test working
          # across such renames as long as exactly one such asset exists.
          # Fetch name+url together in a single API call so we don't pay
          # double for the rate-limit / transient-failure window.
          assets_json=$(gh_retry gh release view "$tag" --json assets \
            -q '[.assets[] | select(.name | test("\\.vhd\\.gz$")) | {name, url}]')
          count=$(echo "$assets_json" | jq 'length')
          if [ "$count" -eq 0 ]; then
            echo "::error::Release $tag has no *.vhd.gz asset"
            exit 1
          fi
          if [ "$count" -gt 1 ]; then
            names=$(echo "$assets_json" | jq -r '[.[].name] | join(" ")')
            echo "::error::Release $tag has multiple *.vhd.gz assets: ${names}"
            exit 1
          fi
          asset=$(echo "$assets_json" | jq -r '.[0].name')
          url=$(echo "$assets_json" | jq -r '.[0].url')
          vhd="${asset%.gz}"
          echo "tag=$tag"     >> "$GITHUB_OUTPUT"
          echo "asset=$asset" >> "$GITHUB_OUTPUT"
          echo "url=$url"     >> "$GITHUB_OUTPUT"
          echo "vhd=$vhd"     >> "$GITHUB_OUTPUT"

      - name: Stage VHD as managed disk in run RG
        if: steps.preflight.outputs.ok == 'true'
        id: stage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RG:       ${{ steps.pick.outputs.rg }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
          TAG:      ${{ steps.rel.outputs.tag }}
          ASSET:    ${{ steps.rel.outputs.asset }}
          VHD:      ${{ steps.rel.outputs.vhd }}
        run: |
          set -euo pipefail
          # Direct-upload managed disk: ARM hands out a short-lived
          # write SAS backed by Azure's compute fabric (not a customer
          # storage account), the runner streams the VHD into it, then
          # ARM seals the disk. No storage account is on the data path,
          # so org policies that forbid publicNetworkAccess=Enabled on
          # storage accounts are satisfied without any networking
          # exception, private endpoint, or self-hosted runner.
          DISK_NAME="smoke-src-${TAG}"
          # Idempotent: reuse an existing sealed disk for the same
          # release tag if a previous attempt already finished. If a
          # prior attempt is wedged in ReadyToUpload (e.g. the runner
          # died mid-upload), drop and recreate so we get a fresh SAS.
          state=$(az disk show -g "$RG" -n "$DISK_NAME" \
            --query diskState -o tsv 2>/dev/null || true)
          if [ "$state" = "Unattached" ] || [ "$state" = "Attached" ]; then
            echo "disk $DISK_NAME already sealed (state=$state) \u2014 reusing"
            disk_id=$(az disk show -g "$RG" -n "$DISK_NAME" --query id -o tsv)
            # Ensure diskControllerTypes is stamped even on reuse \u2014 a prior
            # run may have created the disk with SCSI-only or died before
            # the PATCH completed.
            echo "ensuring diskControllerTypes on reused disk"
            az rest --method PATCH \
              --url "${disk_id}?api-version=2024-03-02" \
              --body '{"properties":{"supportedCapabilities":{"diskControllerTypes":"SCSI, NVMe"}}}'
          else
            if [ -n "$state" ]; then
              echo "disk $DISK_NAME exists in state '$state' \u2014 recreating"
              az disk delete -g "$RG" -n "$DISK_NAME" --yes >/dev/null
            fi
            echo "downloading $ASSET from latest release"
            gh release download "$TAG" --pattern "$ASSET" --output "$ASSET"
            echo "decompressing"
            gunzip "$ASSET"
            ls -lh "$VHD"
            # The uncompressed VHD is the fixed-VHD blob (data + 512B
            # footer). az disk create --upload-size-bytes wants exactly
            # that size; `stat -c %s` gives it without hard-coding the
            # 8 GiB+512 B figure pinned by virtualisation.diskSize in
            # core_pulse.nix.
            size=$(stat -c %s "$VHD")
            echo "creating managed disk $DISK_NAME (upload, $size bytes)"
            # NOTE: there is no CLI knob to declare
            # supportedCapabilities.diskControllerTypes on a managed disk
            # or managed image \u2014 `az disk create`, `az disk update`, and
            # `az image create` all reject `--supported-disk-controller-types`
            # (verified on azure-cli 2.85.0; see the CLI sanity preflight
            # step earlier in this workflow). We stamp "SCSI, NVMe" via
            # the ARM REST API after sealing the disk, then the gallery
            # image definition also declares both controller types so the
            # matrix can test each one independently.
            disk_id=$(az disk create -g "$RG" -n "$DISK_NAME" \
              --location "$LOCATION" \
              --upload-type Upload \
              --upload-size-bytes "$size" \
              --hyper-v-generation V2 \
              --os-type Linux \
              --query id -o tsv)
            echo "requesting write SAS"
            sas=$(az disk grant-access -g "$RG" -n "$DISK_NAME" \
              --access-level Write \
              --duration-in-seconds 3600 \
              --query accessSAS -o tsv)
            # azcopy is preinstalled on ubuntu-latest GitHub-hosted runners.
            echo "uploading VHD via AzCopy"
            # azcopy wants to create ~/.azcopy/{plans,logs}; on hosted
            # runners /home/runner/.azcopy can end up owned by root from
            # earlier steps (e.g. azure/login), so point both locations
            # at a temp dir we fully own.
            azcopy_job_plan_location=$(mktemp -d)
            azcopy_log_location=$(mktemp -d)
            cleanup_azcopy_temp_dirs() {
              rm -rf "$azcopy_log_location" "$azcopy_job_plan_location"
            }
            trap cleanup_azcopy_temp_dirs EXIT
            AZCOPY_LOG_LOCATION="$azcopy_log_location" \
            AZCOPY_JOB_PLAN_LOCATION="$azcopy_job_plan_location" \
              azcopy copy "$VHD" "$sas" --blob-type PageBlob
            trap - EXIT
            cleanup_azcopy_temp_dirs
            echo "revoking write SAS"
            az disk revoke-access -g "$RG" -n "$DISK_NAME" >/dev/null
            # The Azure CLI has no flag to set supportedCapabilities.diskControllerTypes
            # on a managed disk (verified on azure-cli 2.85.0). Use the ARM REST API
            # directly so the disk matches the gallery image definition's
            # DiskControllerTypes=SCSI, NVMe feature declaration.
            echo "stamping diskControllerTypes on managed disk"
            az rest --method PATCH \
              --url "${disk_id}?api-version=2024-03-02" \
              --body '{"properties":{"supportedCapabilities":{"diskControllerTypes":"SCSI, NVMe"}}}'
            rm -f "$VHD"
          fi
          echo "disk_id=$disk_id" >> "$GITHUB_OUTPUT"

      - name: Create gallery image from staged disk
        # Azure Compute Gallery image definitions support declaring
        # diskControllerTypes via --features, so we use a per-run
        # gallery + image definition + image version.
        if: steps.preflight.outputs.ok == 'true'
        id: image
        env:
          RG:       ${{ steps.pick.outputs.rg }}
          TAG:      ${{ steps.rel.outputs.tag }}
          SOURCE_ID: ${{ steps.stage.outputs.disk_id }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
        run: |
          set -euo pipefail
          # Gallery names allow only alphanumerics, underscores, and periods
          # (no hyphens), so convert TAG dashes to underscores.
          GALLERY="smoke_gallery_${TAG//-/_}"
          IMG_DEF="nixos-smoke"
          IMG_VER="1.0.0"

          # 1. Create compute gallery (idempotent).
          if ! az sig show -g "$RG" -r "$GALLERY" >/dev/null 2>&1; then
            echo "creating compute gallery $GALLERY"
            az sig create -g "$RG" -r "$GALLERY" \
              --location "$LOCATION" >/dev/null
          fi

          # 2. Create image definition with SCSI + NVMe support.
          #    The source VHD has no TrustedLaunch artifacts (vTPM, SecureBoot),
          #    so we omit any SecurityType feature \u2014 Azure defaults to Standard
          #    when no SecurityType is declared.
          #    Note: --security-type was removed from az sig image-definition
          #    create in Azure CLI 2.85.0; use --features for SecurityType if
          #    a non-Standard type is ever needed.
          #    If a previous run created the definition with stale features
          #    (e.g. SCSI-only), delete and recreate it so both matrix legs
          #    can deploy.
          if az sig image-definition show -g "$RG" -r "$GALLERY" -i "$IMG_DEF" >/dev/null 2>&1; then
            existing_features=$(az sig image-definition show -g "$RG" -r "$GALLERY" -i "$IMG_DEF" \
              --query "features[?name=='DiskControllerTypes'].value | [0]" -o tsv 2>/dev/null || true)
            if [ "$existing_features" != "SCSI, NVMe" ]; then
              echo "image definition $IMG_DEF has stale DiskControllerTypes='$existing_features' \u2014 recreating"
              # Must delete the image version first (ARM won't delete a
              # definition that still has versions).
              if az sig image-version show -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" >/dev/null 2>&1; then
                az sig image-version delete -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" >/dev/null
              fi
              az sig image-definition delete -g "$RG" -r "$GALLERY" -i "$IMG_DEF" >/dev/null
            fi
          fi
          if ! az sig image-definition show -g "$RG" -r "$GALLERY" -i "$IMG_DEF" >/dev/null 2>&1; then
            echo "creating image definition $IMG_DEF"
            az sig image-definition create -g "$RG" -r "$GALLERY" -i "$IMG_DEF" \
              --os-type Linux \
              --os-state Generalized \
              --hyper-v-generation V2 \
              --location "$LOCATION" \
              --publisher NixOS-CI --offer NixOS --sku smoke \
              --features "DiskControllerTypes=SCSI,NVMe" >/dev/null
          fi

          # 3. Create image version from the uploaded managed disk.
          #    --os-snapshot accepts both snapshot and managed-disk resource IDs.
          #    --target-regions explicitly sets the replication target to the
          #    gallery's own region so Azure doesn't silently skip it.
          created_new_version=false
          if ! az sig image-version show -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" >/dev/null 2>&1; then
            echo "creating image version $IMG_VER"
            az sig image-version create -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" \
              --location "$LOCATION" \
              --os-snapshot "$SOURCE_ID" \
              --replica-count 1 \
              --target-regions "$LOCATION=1" >/dev/null
            created_new_version=true
          fi

          # 4. Wait for image version replication to complete.
          #    provisioningState=Succeeded is necessary but NOT sufficient \u2014
          #    the per-region aggregatedState from --expand ReplicationStatus
          #    must also be "Completed" before az vm create can find the image.
          echo "waiting for image version replication\u2026"
          for i in $(seq 1 30); do
            prov_state=$(az sig image-version show \
              -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" \
              --query provisioningState -o tsv)
            repl_state=$(az sig image-version show \
              -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" \
              --expand ReplicationStatus \
              --query 'replicationStatus.aggregatedState' -o tsv 2>/dev/null || echo "QueryFailed")
            echo "  attempt $i: provisioningState=$prov_state  aggregatedState=$repl_state"
            if [ "$prov_state" = "Succeeded" ] && [ "$repl_state" = "Completed" ]; then
              break
            elif [ "$prov_state" = "Failed" ]; then
              echo "::error::Image version replication failed"
              exit 1
            fi
            sleep 30
          done
          if [ "$prov_state" != "Succeeded" ] || [ "$repl_state" != "Completed" ]; then
            echo "::error::Image version replication did not complete in time (30x30s polling; prov=$prov_state repl=$repl_state)"
            exit 1
          fi

          # Even after aggregatedState=Completed, the ARM deployment service
          # may take additional time to become aware of the new image version.
          # Give Azure a grace period \u2014 but only when we just created one.
          if [ "$created_new_version" = "true" ]; then
            echo "image version replicated; waiting 120s for ARM propagation..."
            sleep 120
          else
            echo "image version already existed; skipping propagation delay"
          fi

          # Export the gallery name so the smoke job can look up the
          # image version ID itself.  We intentionally do NOT export the
          # full image-version resource ID because it embeds the Azure
          # subscription ID, which is a masked secret — GitHub Actions
          # silently drops any job output that contains a secret value.
          echo "gallery=$GALLERY" >> "$GITHUB_OUTPUT"
          echo "img_def=$IMG_DEF" >> "$GITHUB_OUTPUT"
          echo "img_ver=$IMG_VER" >> "$GITHUB_OUTPUT"

  # =====================================================================
  # Job 2: smoke --- boot a VM per controller type (matrix) and SSH-assert
  # =====================================================================
  smoke:
    name: "Smoke ${{ matrix.disk_controller }}"
    needs: prepare
    if: needs.prepare.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        disk_controller: [SCSI, NVMe]

    steps:
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Generate ephemeral SSH keypair
        id: ssh
        run: |
          set -euo pipefail
          d=$(mktemp -d)
          chmod 700 "$d"
          ssh-keygen -t ed25519 -N '' -C 'nixos-ci-smoke' -f "$d/id" >/dev/null
          chmod 600 "$d/id"
          echo "dir=$d" >> "$GITHUB_OUTPUT"

      - name: Determine runner public IP
        id: ip
        run: |
          set -euo pipefail
          ip=$(curl -fsS --retry 3 https://api.ipify.org)
          # Sanity check: must look like an IPv4.
          if ! echo "$ip" | grep -Eq '^[0-9.]+$'; then
            echo "::error::Unexpected runner IP: $ip"
            exit 1
          fi
          echo "runner_ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Create locked-down NSG
        env:
          RG:        ${{ needs.prepare.outputs.rg }}
          RUNNER_IP: ${{ steps.ip.outputs.runner_ip }}
          LOCATION:  ${{ vars.AZURE_LOCATION }}
          DISK_CONTROLLER: ${{ matrix.disk_controller }}
        run: |
          set -euo pipefail
          ctrl_lower=$(echo "$DISK_CONTROLLER" | tr '[:upper:]' '[:lower:]')
          nsg_name="smoke-nsg-${ctrl_lower}"
          az network nsg create -g "$RG" -n "$nsg_name" -l "$LOCATION" >/dev/null
          az network nsg rule create -g "$RG" --nsg-name "$nsg_name" \
            --name allow-ssh-from-runner --priority 1000 \
            --source-address-prefixes "${RUNNER_IP}/32" \
            --destination-port-ranges 22 \
            --access Allow --protocol Tcp --direction Inbound >/dev/null

      - name: Resolve gallery image ID
        id: img
        env:
          RG:      ${{ needs.prepare.outputs.rg }}
          GALLERY: ${{ needs.prepare.outputs.gallery }}
          IMG_DEF: ${{ needs.prepare.outputs.img_def }}
          IMG_VER: ${{ needs.prepare.outputs.img_ver }}
        run: |
          set -euo pipefail
          image_id=$(az sig image-version show \
            -g "$RG" -r "$GALLERY" -i "$IMG_DEF" -e "$IMG_VER" \
            --query id -o tsv)
          if [ -z "$image_id" ]; then
            echo "::error::Failed to resolve gallery image version"
            exit 1
          fi
          echo "image=$image_id" >> "$GITHUB_OUTPUT"

      - name: Create smoke-test VM
        id: vm
        env:
          RG:       ${{ needs.prepare.outputs.rg }}
          IMG:      ${{ steps.img.outputs.image }}
          SSH_DIR:  ${{ steps.ssh.outputs.dir }}
          LOCATION: ${{ vars.AZURE_LOCATION }}
          DISK_CONTROLLER: ${{ matrix.disk_controller }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -euo pipefail

          ctrl_lower=$(echo "$DISK_CONTROLLER" | tr '[:upper:]' '[:lower:]')
          vm_name="smoke-vm-${ctrl_lower}"
          nsg_name="smoke-nsg-${ctrl_lower}"

          # --- OIDC re-login helper -------------------------------------------
          # The GitHub-issued OIDC assertion that azure/login@v2 exchanged for
          # an Azure access-token expires after ~5 minutes. If an `az` command
          # takes longer (e.g. az vm create waiting 20 min for OS provisioning),
          # the CLI silently tries to refresh using the stale assertion and every
          # subsequent call fails with AADSTS700024. Fetching a fresh assertion
          # from $ACTIONS_ID_TOKEN_REQUEST_URL and re-running `az login` avoids
          # this. Cost: one lightweight HTTP call + one token exchange per retry.
          az_oidc_login() {
            echo "refreshing OIDC token..."
            local oidc_token
            if ! oidc_token=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
              | jq -r '.value'); then
              echo "::error::Failed to obtain OIDC token from GitHub"
              return 1
            fi
            if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
              echo "::error::Failed to obtain OIDC token from GitHub"
              return 1
            fi
            az login --service-principal \
              -u "$AZURE_CLIENT_ID" \
              -t "$AZURE_TENANT_ID" \
              --federated-token "$oidc_token" \
              --output none
            az account set -s "$AZURE_SUBSCRIPTION_ID"
          }

          # The gallery image definition declares both SCSI and NVMe disk
          # controller support. Standard_D4ads_v5 supports both SCSI and
          # NVMe; the matrix variable selects which one this leg tests.
          # The NixOS initrd carries both NVMe and SCSI drivers via
          # core_pulse.nix.
          #
          # Retry loop: even after aggregatedState=Completed + propagation
          # delay, the ARM deployment service may still not see the image.
          # Retry with increasing back-off to ride out transient visibility.
          max_attempts=5
          for attempt in $(seq 1 $max_attempts); do
            # Refresh OIDC credentials before each attempt so long-running
            # retries never hit an expired assertion (AADSTS700024).
            az_oidc_login
            echo "az vm create attempt $attempt"
            if az vm create -g "$RG" -n "$vm_name" \
              --location "$LOCATION" \
              --image "$IMG" \
              --size Standard_D4ads_v5 \
              --disk-controller-type "$DISK_CONTROLLER" \
              --admin-username azureuser \
              --ssh-key-values "$SSH_DIR/id.pub" \
              --public-ip-sku Standard \
              --nsg "$nsg_name" \
              --output none; then
              break
            fi
            if [ "$attempt" -eq "$max_attempts" ]; then
              echo "::error::az vm create failed after $max_attempts attempts"
              exit 1
            fi
            echo "retrying in 90s..."
            # Clean up the failed VM resource before retrying and wait for
            # Azure to finish deleting it so the next create does not race
            # with an in-progress delete.
            if az vm show -g "$RG" -n "$vm_name" --output none 2>/dev/null; then
              az vm delete -g "$RG" -n "$vm_name" --yes
              az vm wait -g "$RG" -n "$vm_name" --deleted
            else
              echo "No existing $vm_name found to clean up before retry"
            fi
            sleep 90
          done
          ip=$(az vm show -d -g "$RG" -n "$vm_name" --query publicIps -o tsv)
          if [ -z "$ip" ]; then
            echo "::error::VM has no public IP"
            exit 1
          fi
          echo "public_ip=$ip" >> "$GITHUB_OUTPUT"

      - name: Wait for SSH on VM
        env:
          IP: ${{ steps.vm.outputs.public_ip }}
        run: |
          set -u
          for i in $(seq 1 30); do
            if nc -z -w 5 "$IP" 22; then
              echo "SSH reachable after $i attempt(s)"
              exit 0
            fi
            sleep 10
          done
          echo "::error::SSH never came up on $IP after 5 minutes"
          exit 1

      - name: SSH and assert NixOS
        id: assert
        env:
          IP:      ${{ steps.vm.outputs.public_ip }}
          SSH_DIR: ${{ steps.ssh.outputs.dir }}
        run: |
          set -euo pipefail

          # The Azure provisioning agent (waagent/cloud-init) may still be
          # writing the SSH key to ~azureuser/.ssh/authorized_keys after
          # sshd is listening.  Retry SSH up to 6 times with 15 s sleeps
          # between failures.  With ConnectTimeout=15, worst-case wall
          # time is about 165 s.
          for attempt in $(seq 1 6); do
            echo "SSH login attempt $attempt"
            if out=$(ssh \
              -i "$SSH_DIR/id" \
              -o StrictHostKeyChecking=accept-new \
              -o BatchMode=yes \
              -o ConnectTimeout=15 \
              -o IdentitiesOnly=yes \
              "azureuser@${IP}" \
              'cat /etc/os-release; echo ---; nixos-version' 2>&1); then
              break
            fi
            echo "  ssh failed: $out"
            if [ "$attempt" -eq 6 ]; then
              echo "::error::SSH login failed after 6 attempts: $out"
              exit 1
            fi
            sleep 15
          done

          echo "$out"
          echo ""
          echo "=========================================="
          echo "  SSH TEST SUCCESSFUL"
          echo "  Connected to azureuser@${IP} via SSH"
          echo "  Attempt: $attempt of 6"
          echo "=========================================="
          echo ""

          echo "$out" | grep -Eq '^ID=nixos$' \
            || { echo "::error::/etc/os-release does not declare ID=nixos"; exit 1; }
          nv=$(echo "$out" | awk '/^---$/{flag=1;next} flag' | head -n1)
          if [ -z "$nv" ]; then
            echo "::error::nixos-version returned empty output"
            exit 1
          fi
          echo ""
          echo "=========================================="
          echo "  SMOKE TEST PASSED"
          echo "  NixOS version: $nv"
          echo "  OS verified:   ID=nixos"
          echo "=========================================="
          echo ""
          echo "nixos_version=$nv" >> "$GITHUB_OUTPUT"

      - name: Job summary
        if: always()
        env:
          TAG:     ${{ needs.prepare.outputs.tag }}
          IMG:     ${{ steps.img.outputs.image }}
          IP:      ${{ steps.vm.outputs.public_ip }}
          NV:      ${{ steps.assert.outputs.nixos_version }}
          RG:      ${{ needs.prepare.outputs.rg }}
          DISK_CONTROLLER: ${{ matrix.disk_controller }}
        run: |
          {
            echo "### Smoke test summary \u2014 ${DISK_CONTROLLER}"
            echo
            echo "| Field | Value |"
            echo "|-------|-------|"
            echo "| Disk controller | \`${DISK_CONTROLLER}\` |"
            echo "| Release tag | \`${TAG:-?}\` |"
            echo "| Gallery image version | \`${IMG:-?}\` |"
            echo "| Run RG | \`${RG:-?}\` |"
            # Redact last octet of public IP.
            ipred=$(echo "${IP:-}" | sed -E 's/\.[0-9]+$/.x/')
            echo "| VM public IP | \`${ipred:-?}\` |"
            echo "| nixos-version | \`${NV:-?}\` |"
          } >> "$GITHUB_STEP_SUMMARY"

  # =====================================================================
  # Job 3: cleanup --- complete-mode teardown after both smoke legs finish
  # =====================================================================
  cleanup:
    name: Cleanup
    needs: [prepare, smoke]
    if: always() && needs.prepare.outputs.ok == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      # -----------------------------------------------------------------
      # Layer 1 \u2014 complete-mode teardown with retry + backoff.
      # The empty template tells ARM "the desired state of this RG is
      # nothing"; ARM deletes every resource in dependency order.
      # Role assignments on the RG itself are untouched because the
      # RG is not deleted.
      # -----------------------------------------------------------------
      - name: Teardown run RG (complete-mode, with retry)
        env:
          RG: ${{ needs.prepare.outputs.rg }}
          AZURE_CLIENT_ID:       ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID:       ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        run: |
          set -u
          # Re-authenticate: the OIDC assertion from the initial azure/login
          # step expires after ~5 min, and long-running steps (VM create +
          # retries) can easily exceed that. Fetch a fresh assertion so
          # teardown never fails with AADSTS700024.
          az_oidc_login() {
            local oidc_token
            oidc_token=$(curl -fsSL -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=api://AzureADTokenExchange" \
              | jq -r '.value')
            if [ -z "$oidc_token" ] || [ "$oidc_token" = "null" ]; then
              echo "::warning::Failed to obtain OIDC token for teardown"
              return 1
            fi
            az login --service-principal \
              -u "$AZURE_CLIENT_ID" \
              -t "$AZURE_TENANT_ID" \
              --federated-token "$oidc_token" \
              --output none
            az account set -s "$AZURE_SUBSCRIPTION_ID"
          }
          az_oidc_login || true

          ok=0
          for attempt in 1 2 3; do
            echo "::group::Teardown attempt ${attempt}"
            if az deployment group create \
                 --resource-group "$RG" \
                 --name "teardown-$(date -u +%Y%m%d-%H%M%S)" \
                 --mode Complete \
                 --template-file scripts/azure/empty-rg.json; then
              echo "Attempt ${attempt} succeeded"
              ok=1
              echo "::endgroup::"
              break
            fi
            echo "Attempt ${attempt} failed"
            echo "::endgroup::"
            sleep 60
          done
          if [ "$ok" -ne 1 ]; then
            echo "::warning::All 3 teardown attempts failed for $RG"
          fi

      # -----------------------------------------------------------------
      # Layer 2 \u2014 verify RG is actually empty. Fails the job loudly if
      # not, which surfaces as a red workflow \u2192 GitHub notifies you.
      # -----------------------------------------------------------------
      - name: Verify run RG is empty
        env:
          RG: ${{ needs.prepare.outputs.rg }}
        run: |
          set -eu
          remaining=$(az resource list -g "$RG" --query "length(@)" -o tsv)
          echo "Resources remaining in $RG: $remaining"
          if [ "$remaining" -ne 0 ]; then
            az resource list -g "$RG" -o table || true
            echo "::error::Run RG $RG is not empty after teardown (remaining=$remaining). Janitor will retry."
            exit 1
          fi
