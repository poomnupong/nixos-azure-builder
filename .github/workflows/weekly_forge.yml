name: Weekly Forge

on:
  schedule:
    # Run every Saturday at 00:00 US Central Standard Time (06:00 UTC).
    # Note: GitHub Actions cron runs in UTC and does not observe DST, so
    # during US Central Daylight Time this effectively runs at 01:00 local.
    - cron: "0 6 * * 6"
  workflow_dispatch:

permissions:
  contents: write # needed to create GitHub Releases

jobs:
  build-and-release:
    name: Build NixOS Azure VHD
    runs-on: ubuntu-latest

    steps:
      # -----------------------------------------------------------------------
      # 1. Checkout
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -----------------------------------------------------------------------
      # 2. Install Nix (with flakes enabled) and prime the Magic Nix Cache.
      #    magic-nix-cache-action also frees ~100 GB of runner disk space that
      #    GitHub's default image wastes on pre-installed software we don't use.
      # -----------------------------------------------------------------------
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v14

      - name: Enable Magic Nix Cache (Nothing but Nix)
        uses: DeterminateSystems/magic-nix-cache-action@v8

      # -----------------------------------------------------------------------
      # 3. Generate the version / release tag
      # -----------------------------------------------------------------------
      - name: Generate version string
        id: version
        run: |
          chmod +x ./get_version.sh
          VERSION=$(./get_version.sh)
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Built version: ${VERSION}"

      # -----------------------------------------------------------------------
      # 4. Build the Azure VHD image
      # -----------------------------------------------------------------------
      - name: Build Azure image
        run: nix build .#azureImage --print-build-logs

      # -----------------------------------------------------------------------
      # 5. Locate the .vhd file produced by the build
      # -----------------------------------------------------------------------
      - name: Locate VHD artifact
        id: artifact
        run: |
          VHD_PATH=$(find result/ -name "*.vhd" | head -n 1)
          if [ -z "${VHD_PATH}" ]; then
            echo "ERROR: No .vhd file found under result/" >&2
            exit 1
          fi
          echo "VHD_PATH=${VHD_PATH}" >> "$GITHUB_OUTPUT"
          echo "Found VHD: ${VHD_PATH}"

      # -----------------------------------------------------------------------
      # 6. Stage and compress the VHD.
      #
      #    GitHub Release assets are capped at 2 GiB each, but the raw Azure
      #    VHD is ~5 GB. Gzip-compress the image before upload — VHDs contain
      #    large runs of zeros and typically shrink by an order of magnitude,
      #    well under the 2 GiB asset limit.
      # -----------------------------------------------------------------------
      - name: Stage and compress VHD for upload
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          VHD_PATH="${{ steps.artifact.outputs.VHD_PATH }}"
          ASSET="azimage-${VERSION}.vhd"
          cp "${VHD_PATH}" "${ASSET}"
          gzip -9 "${ASSET}"
          ls -lh "${ASSET}.gz"

      # -----------------------------------------------------------------------
      # 7. Create a GitHub Release and upload the compressed VHD
      # -----------------------------------------------------------------------
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: ${{ steps.version.outputs.VERSION }}
          body: |
            Weekly NixOS Azure VHD image — built automatically by the
            **Weekly Forge** workflow.

            **Tag:** `${{ steps.version.outputs.VERSION }}`

            The asset is gzip-compressed to fit within GitHub's 2 GiB
            release-asset limit. Decompress before use:

            ```sh
            gunzip azimage-${{ steps.version.outputs.VERSION }}.vhd.gz
            ```

            Then stage `azimage-${{ steps.version.outputs.VERSION }}.vhd`
            as a **direct-upload managed disk** — no customer-owned Storage
            Account is required:

            ```sh
            VHD=azimage-${{ steps.version.outputs.VERSION }}.vhd
            SIZE=$(stat -c %s "$VHD")
            DISK_ID=$(az disk create -g <rg> -n nixos-src \
              --location <region> \
              --upload-type Upload --upload-size-bytes "$SIZE" \
              --hyper-v-generation V2 --os-type Linux \
              --query id -o tsv)
            SAS=$(az disk grant-access -g <rg> -n nixos-src \
              --access-level Write --duration-in-seconds 3600 \
              --query accessSAS -o tsv)
            azcopy copy "$VHD" "$SAS" --blob-type PageBlob
            az disk revoke-access -g <rg> -n nixos-src
            # Stamp NVMe+SCSI support (Azure CLI has no flag for this —
            # must go through the ARM REST API directly):
            az rest --method PATCH \
              --url "${DISK_ID}?api-version=2024-03-02" \
              --body '{"properties":{"supportedCapabilities":{"diskControllerTypes":"SCSI, NVMe"}}}'
            az image create -g <rg> -n nixos-img \
              --os-type Linux --hyper-v-generation V2 \
              --source "$DISK_ID"
            ```

            The shipped initrd loads both Hyper-V SCSI and NVMe drivers,
            so the OS boots regardless of which controller Azure exposes.
            The disk controller is selected per-VM via `az vm create
            --disk-controller-type {SCSI|NVMe}`. All VM families including
            v7 NVMe-only SKUs are supported after the `az rest` PATCH above
            stamps `supportedCapabilities.diskControllerTypes` on the disk.

            (Uploading the `.vhd` to a Storage Account as a fixed-VHD page
            blob and pointing `az image create --source` at the blob URI
            still works if your environment requires it.)
          files: azimage-${{ steps.version.outputs.VERSION }}.vhd.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
